<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrabajoYa Admin</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <div id="login-screen" class="login-screen hidden">
      <div class="login-card">
        <div class="brand">
          <span class="brand-icon">TY</span>
          <div>
            <h1>TrabajoYa Admin</h1>
            <p>Panel de conversaciones WhatsApp</p>
          </div>
        </div>
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          placeholder="admin"
          autocomplete="username"
        />
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <button id="login-btn" type="button">Entrar</button>
        <p id="login-error" class="error hidden"></p>
      </div>
    </div>

    <div id="app" class="app hidden">
      <aside class="sidebar">
        <div class="brand compact">
          <span class="brand-icon">TY</span>
          <strong>TrabajoYa</strong>
        </div>
        <nav>
          <button class="nav-btn active" data-view="overview">Resumen</button>
          <button class="nav-btn" data-view="sessions">Conversaciones</button>
          <button class="nav-btn" data-view="messages">Mensajes</button>
          <button class="nav-btn" data-view="funnel">Embudo</button>
          <button class="nav-btn" data-view="webhooks">Webhooks</button>
        </nav>
        <button id="logout-btn" class="ghost-btn">Cerrar sesión</button>
        <p id="user-label" class="user-label"></p>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="view-title">Resumen</h2>
            <p id="view-subtitle">Métricas en tiempo real</p>
          </div>
          <button id="refresh-btn" class="primary-btn">Actualizar</button>
        </header>

        <section id="view-overview" class="view">
          <div id="stats-grid" class="stats-grid"></div>
        </section>

        <section id="view-sessions" class="view hidden">
          <div class="toolbar">
            <input id="sessions-search" type="search" placeholder="Buscar número…" />
            <select id="sessions-status">
              <option value="">Todos los estados</option>
              <option value="active">Active</option>
              <option value="idle">Idle</option>
              <option value="handoff">Handoff</option>
              <option value="closed">Closed</option>
            </select>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Número</th>
                  <th>Paso</th>
                  <th>Estado</th>
                  <th>Mensajes</th>
                  <th>Último mensaje</th>
                </tr>
              </thead>
              <tbody id="sessions-table"></tbody>
            </table>
          </div>
          <div id="sessions-pagination" class="pagination"></div>
        </section>

        <section id="view-messages" class="view hidden">
          <div class="toolbar">
            <input id="messages-search" type="search" placeholder="Buscar número…" />
            <select id="messages-direction">
              <option value="">Todas las direcciones</option>
              <option value="inbound">Inbound</option>
              <option value="outbound">Outbound</option>
            </select>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Número</th>
                  <th>Dir.</th>
                  <th>Tipo</th>
                  <th>Contenido</th>
                </tr>
              </thead>
              <tbody id="messages-table"></tbody>
            </table>
          </div>
          <div id="messages-pagination" class="pagination"></div>
        </section>

        <section id="view-funnel" class="view hidden">
          <div id="funnel-chart" class="funnel-chart"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Paso</th>
                  <th>Estado</th>
                  <th>Sesiones</th>
                </tr>
              </thead>
              <tbody id="funnel-table"></tbody>
            </table>
          </div>
        </section>

        <section id="view-webhooks" class="view hidden">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>WA Message ID</th>
                  <th>Procesado</th>
                </tr>
              </thead>
              <tbody id="webhooks-table"></tbody>
            </table>
          </div>
          <div id="webhooks-pagination" class="pagination"></div>
        </section>
      </main>
    </div>

    <dialog id="session-dialog">
      <div class="dialog-header">
        <div>
          <h3 id="dialog-title">Conversación</h3>
          <p id="dialog-meta"></p>
        </div>
        <button id="dialog-close" type="button" aria-label="Cerrar">×</button>
      </div>
      <div id="dialog-context" class="context-box"></div>
      <div id="dialog-thread" class="thread"></div>
    </dialog>

    <script src="/admin/app.js" type="module"></script>
  </body>
</html>
